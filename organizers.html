<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NONO & CARLOS — International Bachata Artists · Organizers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            red:       '#E34242',
            'red-dk':  '#C42F2F',
            ink:       '#0A0A0A',
            muted:     '#6B6B6B',
            pale:      '#FAFAFA',
          },
          fontFamily: { sans: ['Poppins','sans-serif'] },
        },
      },
    };
  </script>

  <style>
    /* ─── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; background: #FAFAFA; color: #0A0A0A; overflow-x: hidden; }

    :root {
      --red:    #E34242;
      --red-dk: #C42F2F;
      --ink:    #0A0A0A;
      --pale:   #FAFAFA;
    }

    /* ─── NAVBAR ─────────────────────────────── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.25rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      transition: background .4s, box-shadow .4s;
    }
    #nav.scrolled {
      background: rgba(10,10,10,.93);
      backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(255,255,255,.06);
    }
    .nav-logo {
      font-size: .95rem; font-weight: 800;
      letter-spacing: .18em; text-transform: uppercase; color: #fff;
      text-decoration: none;
    }
    .nav-logo span { color: var(--red); }
    .nav-cta {
      font-size: .7rem; font-weight: 600;
      letter-spacing: .14em; text-transform: uppercase;
      color: #fff; border: 1px solid rgba(255,255,255,.35);
      padding: .5rem 1.25rem; border-radius: 2px;
      transition: background .2s, border-color .2s;
      text-decoration: none;
    }
    .nav-cta:hover { background: var(--red); border-color: var(--red); }

    /* ─── HERO ───────────────────────────────── */
    #hero {
      position: relative;
      overflow: hidden;
      background: #000;
    }

    @media (max-width: 767px) {
      #hero { height: 100svh; min-height: 580px; }
      #hero-video {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        object-position: center center;
        opacity: .6;
        pointer-events: none;
      }
    }

    @media (min-width: 768px) and (max-width: 1023px) {
      #hero { height: 100svh; min-height: 600px; }
      #hero-video {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        object-position: center 20%;
        opacity: .55;
        pointer-events: none;
      }
    }

    @media (min-width: 1024px) {
      #hero { height: 100vh; min-height: 680px; }
      #hero-video {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        object-position: center 15%;
        opacity: .5;
        pointer-events: none;
      }
    }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,.2)  0%,
        rgba(0,0,0,.05) 35%,
        rgba(0,0,0,.65) 100%);
    }
    .hero-content {
      position: relative; z-index: 2;
      height: 100%; display: flex;
      flex-direction: column; justify-content: flex-end;
      padding: 0 1.5rem 3.5rem;
      max-width: 1200px; margin: 0 auto;
    }
    @media(min-width:768px) { .hero-content { padding: 0 2.5rem 5rem; } }

    .hero-kicker {
      font-size: .62rem; font-weight: 600;
      letter-spacing: .28em; text-transform: uppercase;
      color: var(--red); margin-bottom: .75rem;
      opacity: 0; animation: fadeUp .7s .3s forwards;
    }
    .hero-h1 {
      font-size: clamp(2.2rem, 6vw, 5.5rem);
      font-weight: 900; line-height: 1.0;
      color: #fff; text-transform: uppercase;
      letter-spacing: -.01em;
      opacity: 0; animation: fadeUp .8s .5s forwards;
    }
    .hero-h1 em { color: var(--red); font-style: normal; }
    .hero-sub {
      font-size: clamp(.82rem, 1.4vw, 1rem);
      font-weight: 300; color: rgba(255,255,255,.7);
      max-width: 500px; margin-top: .9rem; line-height: 1.75;
      opacity: 0; animation: fadeUp .8s .7s forwards;
    }
    .hero-scroll {
      margin-top: 2rem; display: flex; align-items: center; gap: .75rem;
      opacity: 0; animation: fadeUp .8s .9s forwards;
    }
    .hero-scroll span {
      font-size: .62rem; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }
    .scroll-line {
      width: 40px; height: 1px; background: rgba(255,255,255,.25);
      position: relative; overflow: hidden;
    }
    .scroll-line::after {
      content:''; position:absolute; top:0; left:-100%;
      width:100%; height:100%; background:var(--red);
      animation: scanLine 2.2s 1.2s infinite;
    }

    /* ─── SECTION SHARED ─────────────────────── */
    .sec { padding: 5rem 1.5rem; }
    @media(min-width:768px) { .sec { padding: 6.5rem 2.5rem; } }
    .sec-inner { max-width: 1200px; margin: 0 auto; }
    .tag {
      display: inline-block;
      font-size: .62rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--red); margin-bottom: .5rem;
    }
    .sec-title {
      font-size: clamp(1.7rem, 3.5vw, 2.8rem);
      font-weight: 800; line-height: 1.1;
      color: var(--ink); letter-spacing: -.02em;
    }
    .red-line { width: 36px; height: 3px; background: var(--red); margin: 1.1rem 0; }

    /* ─── ABOUT ──────────────────────────────── */
    #about { background: #fff; }
    .about-grid {
      display: grid; gap: 3rem; align-items: start;
    }
    @media(min-width:768px) {
      .about-grid {
        grid-template-columns: 1fr 1fr;
        align-items: center;
        gap: 4rem;
      }
    }

    /* Image container */
    .about-img-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    @media(min-width:768px) {
      .about-img-wrap::before {
        content: '';
        position: absolute;
        top: -10px; right: -10px;
        width: 100%; height: 100%;
        border: 2px solid var(--red);
        border-radius: 6px; z-index: 0;
      }
    }
    .about-img-wrap img {
      position: relative; z-index: 1;
      width: 100%;
      max-height: 560px;
      object-fit: cover;
      object-position: center top;
      border-radius: 6px;
      display: block;
    }

    .about-text p {
      font-size: .9rem; font-weight: 300;
      line-height: 1.9; color: #444; margin-bottom: 1.1rem;
    }
    .stat-row {
      display: flex; gap: 2rem;
      margin-top: 2rem; padding-top: 2rem;
      border-top: 1px solid #EFEFEF;
    }
    .stat-num { font-size: 2rem; font-weight: 800; color: var(--red); line-height: 1; }
