<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NonoyCarlos Bachata – Barcelona</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            passion:      '#E34242',
            'passion-dk': '#C42F2F',
            ink:          '#1A1A1A',
            muted:        '#6B6B6B',
            soft:         '#F7F3F3',
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Poppins', sans-serif; color: #1A1A1A; background: #fff; overflow-x: hidden; }

    /* ── NAV ── */
    #navbar { transition: background .35s, box-shadow .35s; }
    #navbar.scrolled {
      background: rgba(255,255,255,.97);
      box-shadow: 0 1px 20px rgba(0,0,0,.08);
    }
    #navbar.scrolled .nav-logo { color: #1A1A1A; }
    #navbar.scrolled .nav-link { color: #1A1A1A; }
    #navbar.scrolled .nav-link:hover { color: #E34242; }

    /* ── HERO ── */
    #hero { position: relative; height: 100vh; min-height: 620px; overflow: hidden; }

    #hero-video {
      position: absolute; inset: 0; z-index: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(
        to top,
        rgba(0,0,0,.72) 0%,
        rgba(0,0,0,.22) 50%,
        rgba(0,0,0,.08) 100%
      );
    }

    /* Text anchored to bottom */
    .hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 2;
      padding: 0 1.5rem 3.5rem;
    }

    /* ── BUTTONS ── */
    .btn-red {
      display: inline-block;
      background: #E34242; color: #fff;
      padding: .8rem 2rem; border-radius: 4px;
      font-size: .8rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      transition: background .2s, transform .2s;
    }
    .btn-red:hover { background: #C42F2F; transform: translateY(-2px); }

    .btn-ghost {
      display: inline-block;
      border: 1.5px solid rgba(255,255,255,.8); color: #fff;
      padding: .78rem 2rem; border-radius: 4px;
      font-size: .8rem; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase;
      transition: background .2s, border-color .2s, transform .2s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.12); transform: translateY(-2px); }

    /* ── SECTION LABEL ── */
    .section-label {
      display: block;
      font-size: .7rem; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase;
      color: #E34242; margin-bottom: .75rem;
    }
    .red-bar { width: 40px; height: 2px; background: #E34242; margin: 0 auto 1.25rem; }

    /* ── CERT BADGE ── */
    .cert-badge {
      border: 1px solid #EDEDED; border-radius: 6px;
      padding: .75rem 1.25rem;
      font-size: .78rem; font-weight: 500; color: #1A1A1A;
      background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.05);
      display: flex; align-items: center; gap: .5rem;
    }

    /* ── TESTIMONIAL CARD ── */
    .t-card {
      background: #fff; border: 1px solid #EFEFEF; border-radius: 10px;
      padding: 2rem 1.75rem; box-shadow: 0 4px 20px rgba(0,0,0,.05);
      transition: transform .25s, box-shadow .25s;
    }
    .t-card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,.1); }

    /* ── PRICE CARD ── */
    .p-card {
      border: 1px solid #EFEFEF; border-radius: 10px;
      padding: 2.25rem 2rem; background: #fff;
      transition: transform .25s, box-shadow .25s, border-color .25s;
    }
    .p-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(227,66,66,.12); border-color: #E34242; }
    .p-card.featured { border: 2px solid #E34242; }
    .popular-badge {
      background: #E34242; color: #fff;
      font-size: .65rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      padding: .28rem .8rem; border-radius: 20px;
    }

    /* ── SCROLL REVEAL ── */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity .65s ease, transform .65s ease; }
    .reveal.in { opacity: 1; transform: none; }
    .d1 { transition-delay: .1s; }
    .d2 { transition-delay: .2s; }
    .d3 { transition-delay: .3s; }
    .d4 { transition-delay: .4s; }

    /* ── MOBILE MENU ── */
    #mob-menu { max-height: 0; opacity: 0; overflow: hidden; transition: max-height .3s ease, opacity .3s ease; }
    #mob-menu.open { max-height: 320px; opacity: 1; }
  </style>
</head>
<body>

<nav id="navbar" class="fixed top-0 inset-x-0 z-50 px-6 md:px-12 py-4">
  <div class="max-w-6xl mx-auto flex items-center justify-between">

    <a href="#" class="nav-logo text-white text-xl font-semibold tracking-wide">
      Nonoy<span style="color:#E34242">Carlos</span>
    </a>

    <div class="hidden md:flex items-center gap-8">
      <a href="#about"        class="nav-link text-white/85 text-sm font-medium transition-colors hover:text-passion">Nosotros</a>
      <a href="#testimonials" class="nav-link text-white/85 text-sm font-medium transition-colors hover:text-passion">Testimonios</a>
      <a href="#pricing"      class="nav-link text-white/85 text-sm font-medium transition-colors hover:text-passion">Tarifas</a>
      <a href="#contact"      class="btn-red text-xs">Contáctanos</a>
    </div>

    <button id="hamburger" class="md:hidden text-white" aria-label="Menú">
      <svg id="ico-open"  class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      <svg id="ico-close" class="w-6 h-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  <div id="mob-menu" class="md:hidden bg-white rounded-b-xl shadow-lg mt-2 px-4">
    <a href="#about"        class="block py-3 text-ink text-sm font-medium border-b border-gray-100 hover:text-passion">Nosotros</a>
    <a href="#testimonials" class="block py-3 text-ink text-sm font-medium border-b border-gray-100 hover:text-passion">Testimonios</a>
    <a href="#pricing"      class="block py-3 text-ink text-sm font-medium border-b border-gray-100 hover:text-passion">Tarifas</a>
    <a href="#contact"      class="block my-3 btn-red text-center text-xs">Contáctanos</a>
  </div>
</nav>
